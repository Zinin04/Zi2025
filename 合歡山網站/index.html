<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth bg-[#050505]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 境 | 合歡山攝影紀實 - @zinininc</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Google Fonts for Editorial Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Cormorant Garamond for elegant English text, Noto Serif TC for beautiful Chinese typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #f3f4f6;
            --muted-color: #71717a;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Serif TC', serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-eng {
            font-family: 'Cormorant Garamond', serif;
        }

        /* Minimalist Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px;
        }

        /* Cinematic Fade-in Animation Classes */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.5s cubic-bezier(0.2, 1, 0.3, 1), transform 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Staggered reveal delays for grouped items */
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }

        /* Elegant image wrapper */
        .img-wrapper {
            overflow: hidden;
            background-color: #111;
        }
        .img-wrapper img {
            transition: transform 2s cubic-bezier(0.2, 1, 0.3, 1), filter 1s ease;
            filter: brightness(0.9) contrast(1.05);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .img-wrapper:hover img {
            transform: scale(1.04);
            filter: brightness(1) contrast(1.1);
        }
    </style>
</head>
<body class="selection:bg-zinc-800 selection:text-white">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 p-6 md:p-10 mix-blend-difference flex justify-between items-center text-white pointer-events-none">
        <div class="text-base md:text-lg tracking-[0.4em] uppercase font-eng pointer-events-auto">Hehuanshan 2025</div>
        <a href="https://instagram.com/zinininc" target="_blank" class="text-base md:text-lg tracking-widest hover:opacity-50 transition-opacity pointer-events-auto font-eng">
            @zinininc
        </a>
    </nav>

    <!-- Hero Section: Sea of Clouds -->
    <header class="relative w-full h-screen flex flex-col justify-center items-center text-center px-4">
        <div class="absolute inset-0 z-0">
            <!-- MAR.jpg: Sea of clouds -->
            <img src="MAR.jpg" alt="合歡山雲海" class="w-full h-full object-cover opacity-60" onerror="this.onerror=null; this.src='https://placehold.co/1920x1080/111111/555555?text=MAR.jpg';">
            <!-- Gradient for text readability -->
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#050505]"></div>
        </div>
        
        <div class="relative z-10 reveal active mt-12 md:mt-20">
            <h2 class="font-eng text-3xl md:text-4xl tracking-[0.5em] text-zinc-400 mb-10 uppercase">A Visual Diary</h2>
            <h1 class="text-7xl md:text-9xl lg:text-[10rem] font-light tracking-[0.2em] mb-12 leading-none">
                境 <span class="mx-6 md:mx-10 text-5xl md:text-7xl opacity-30 font-light">/</span> 2025
            </h1>
            <p class="text-zinc-300 tracking-[0.25em] text-xl md:text-3xl font-light">
                在海拔三千公尺之上，遇見時間的留白。
            </p>
        </div>
        
        <!-- Minimal scroll indicator -->
        <div class="absolute bottom-12 left-1/2 -translate-x-1/2 z-10 font-eng text-zinc-500 tracking-[0.4em] text-base uppercase animate-pulse">
            Scroll
            <div class="w-[1px] h-16 bg-zinc-500 mx-auto mt-6"></div>
        </div>
    </header>

    <main class="w-full max-w-[100rem] mx-auto px-6 sm:px-10 md:px-20 py-32 md:py-48 space-y-40 md:space-y-64">
        
        <!-- Chapter 1: The Path -->
        <section class="grid grid-cols-1 md:grid-cols-12 gap-12 md:gap-20 items-center">
            <!-- Text block offset -->
            <div class="md:col-span-4 md:col-start-2 reveal order-2 md:order-1">
                <h3 class="text-5xl md:text-7xl tracking-[0.2em] text-zinc-100 mb-10 font-light">行跡</h3>
                <p class="text-zinc-400 tracking-[0.2em] leading-[2.2] text-xl md:text-2xl font-light">
                    沿著蜿蜒的公路與積雪的護欄前行。<br>每一步，都在向冷冽的純粹靠近。
                </p>
            </div>
            
            <!-- JAN.jpg: Winding road with people -->
            <div class="md:col-span-6 reveal delay-100 order-1 md:order-2 img-wrapper aspect-[4/3] md:aspect-[16/10]">
                <img src="JAN.jpg" alt="合歡山蜿蜒公路" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/1600x1000/111111/555555?text=JAN.jpg';">
            </div>
            
            <!-- FEB.jpg: Person by guardrail -->
            <div class="md:col-span-5 md:col-start-8 mt-16 md:-mt-32 reveal delay-200 order-3 img-wrapper aspect-[3/4]">
                <img src="FEB.jpg" alt="駐足於冰雪岩壁前" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/600x800/111111/555555?text=FEB.jpg';">
            </div>
        </section>

        <!-- Chapter 2: Life in Frost -->
        <section class="pt-16 md:pt-32">
            <div class="text-center reveal mb-20 md:mb-32">
                <h3 class="text-5xl md:text-7xl tracking-[0.2em] text-zinc-100 mb-10 font-light">微光</h3>
                <p class="text-zinc-400 tracking-[0.2em] text-xl md:text-2xl font-light">冰點之下的呼吸，微小而堅韌。</p>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 md:gap-12">
                <!-- AUG.jpg: Bird -->
                <div class="reveal delay-100 img-wrapper aspect-square md:mt-20">
                    <img src="AUG.jpg" alt="高山鳥類" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/800x800/111111/555555?text=AUG.jpg';">
                </div>
                <!-- DEC.jpg: Frost on ground -->
                <div class="reveal delay-200 img-wrapper aspect-[4/5]">
                    <img src="DEC.jpg" alt="岩石上的冰霜" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/800x1000/111111/555555?text=DEC.jpg';">
                </div>
                <!-- JUN.jpg: Frosty Pine Tree -->
                <div class="reveal delay-300 img-wrapper aspect-square md:mt-40">
                    <img src="JUN.jpg" alt="結霜的松樹" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/800x800/111111/555555?text=JUN.jpg';">
                </div>
            </div>
        </section>

        <!-- Chapter 3: Sanctuary -->
        <section class="grid grid-cols-1 md:grid-cols-12 gap-12 md:gap-20 items-center pt-16 md:pt-32">
            <!-- NOV.jpg: Ridge building, moody -->
            <div class="md:col-span-8 md:col-start-1 reveal img-wrapper aspect-[16/9]">
                <img src="NOV.jpg" alt="山稜線上的孤高建築" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/1600x900/111111/555555?text=NOV.jpg';">
            </div>
            
            <div class="md:col-span-4 md:col-start-9 reveal delay-100 space-y-8 pl-0 md:pl-8">
                <h3 class="text-5xl md:text-7xl tracking-[0.2em] text-zinc-100 font-light">棲息</h3>
                <p class="text-zinc-400 tracking-[0.2em] leading-[2.2] text-xl md:text-2xl font-light">
                    群山之間的寂靜庇護。<br>風雪再大，也安放著旅人的靈魂。
                </p>
            </div>

            <!-- JUL.jpg: Red roof building -->
            <div class="md:col-span-6 md:col-start-3 mt-16 md:mt-32 reveal delay-200 img-wrapper aspect-[4/3]">
                <img src="JUL.jpg" alt="雪中的紅屋頂建築" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/800x600/111111/555555?text=JUL.jpg';">
            </div>
        </section>

        <!-- Chapter 4: Grandeur -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16 pt-16 md:pt-32">
            <!-- MAY.jpg: Sunny mountain slope -->
            <div class="reveal img-wrapper aspect-[4/3] md:aspect-[3/4]">
                <img src="MAY.jpg" alt="連綿的雪山坡面" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/800x600/111111/555555?text=MAY.jpg';">
            </div>
            <div class="flex flex-col justify-between pt-16 md:pt-0">
                <div class="reveal delay-100 px-4 md:px-16 mt-0 md:mt-40 mb-20 md:mb-0">
                    <h3 class="text-5xl md:text-7xl tracking-[0.2em] text-zinc-100 mb-10 font-light">仰望</h3>
                    <p class="text-zinc-400 tracking-[0.2em] leading-[2.2] text-xl md:text-2xl font-light">
                        在群峰之巔，萬物歸於平靜。<br>只剩下光影與純粹的白。
                    </p>
                </div>
                <!-- APR.jpg: Snowy mountain peak -->
                <div class="reveal delay-200 img-wrapper aspect-[16/9] md:aspect-[4/3]">
                    <img src="APR.jpg" alt="合歡山白雪山峰" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/1600x900/111111/555555?text=APR.jpg';">
                </div>
            </div>
        </section>

        <!-- Chapter 5: Encounters (New Photos Added Here) -->
        <section class="grid grid-cols-1 md:grid-cols-12 gap-12 md:gap-20 items-start pt-32 md:pt-48">
            <!-- Text & OCT.jpg (Landscape) -->
            <div class="md:col-span-8 md:col-start-1 reveal order-2 md:order-1">
                <div class="mb-16 md:mb-32 px-4 md:px-0 pr-0 md:pr-12">
                    <h3 class="text-5xl md:text-7xl tracking-[0.2em] text-zinc-100 mb-10 font-light">相遇</h3>
                    <p class="text-zinc-400 tracking-[0.2em] leading-[2.2] text-xl md:text-2xl font-light">
                        在廣袤的峰巒間，每一次停駐都是緣分。<br>凝視光影的游移，與高山的生命無聲交會。
                    </p>
                </div>
                <div class="img-wrapper aspect-[16/10]">
                    <!-- OCT.jpg -->
                    <img src="OCT.jpg" alt="陽光灑落的山巒與松林" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/1600x1000/111111/555555?text=OCT.jpg';">
                </div>
            </div>
            
            <!-- SEP.jpg (Bird on fence) -->
            <div class="md:col-span-4 md:col-start-9 reveal delay-200 order-1 md:order-2 mt-0 md:mt-64 img-wrapper aspect-[3/4]">
                <!-- SEP.jpg -->
                <img src="SEP.jpg" alt="停在結霜纜繩上的高山鳥類" loading="lazy" onerror="this.onerror=null; this.src='https://placehold.co/800x1066/111111/555555?text=SEP.jpg';">
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="w-full py-40 md:py-56 px-6 text-center border-t border-zinc-900 reveal relative overflow-hidden mt-20">
        
        <h2 class="font-eng text-zinc-600 text-lg md:text-xl tracking-[0.5em] mb-12 uppercase">End of Journey</h2>
        
        <p class="text-3xl md:text-5xl text-zinc-200 tracking-[0.3em] mb-24 font-light leading-relaxed">
            把風景帶走，把心留下。
        </p>

        <!-- Elegant IG Link Button -->
        <a href="https://instagram.com/zinininc" target="_blank" class="inline-flex flex-col items-center group mt-10">
            <span class="text-zinc-400 font-eng tracking-[0.3em] text-3xl md:text-5xl mb-4 group-hover:text-white transition-colors duration-500">
                @zinininc
            </span>
            <span class="w-0 h-[2px] bg-white group-hover:w-full transition-all duration-700 ease-in-out"></span>
        </a>
        
    </footer>

    <!-- Script for smooth reveal animations -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const revealElements = document.querySelectorAll('.reveal');
            
            // Intersection Observer configuration
            const observerOptions = {
                root: null,
                rootMargin: '0px 0px -10% 0px', 
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            revealElements.forEach(el => {
                observer.observe(el);
            });
            
            // Prevent right click on images
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.addEventListener('contextmenu', (e) => e.preventDefault());
            });
        });
    </script>
</body>
</html>
